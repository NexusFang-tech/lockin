<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">
<title>LOCK IN</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#020617;--surface:#0f172a;--surface2:#1e293b;--border:#334155;--text:#f8fafc;--text2:#94a3b8;--green:#22c55e;--green2:#16a34a;--cyan:#06b6d4;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--blue:#3b82f6;--pink:#ec4899}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:80px}
.hdr{text-align:center;padding:16px 16px 4px;background:linear-gradient(180deg,rgba(34,197,94,.08),transparent)}
.hdr-title{font-size:28px;font-weight:800;letter-spacing:4px;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:13px;color:var(--text2);margin-top:2px}
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px 4px}
.date-nav button{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px 10px}
.date-nav-label{font-size:15px;font-weight:600;color:var(--text);cursor:pointer;padding:4px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);min-width:140px;text-align:center}
.date-nav-label.past{border-color:var(--amber);color:var(--amber)}
.date-nav-today{font-size:12px;color:var(--cyan);cursor:pointer;padding:4px 10px;border:1px solid var(--cyan);border-radius:6px;background:none;font-weight:600}
.content{padding:12px 16px 16px}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 4px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100}
.tab-btn{flex:1;background:none;border:none;color:var(--text2);font-size:9px;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-radius:8px;transition:all .2s}
.tab-btn.active{color:var(--green);background:rgba(34,197,94,.1)}
.tab-icon{font-size:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(51,65,85,.5)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:14px;color:var(--text2)}
.stat-value{font-size:18px;font-weight:700}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--green);color:#000}
.btn-primary:active{background:var(--green2);transform:scale(.98)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:active{background:var(--border)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:8px}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
input,select,textarea{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;-webkit-appearance:none}
input[type="date"]{color-scheme:dark}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
textarea{resize:vertical;min-height:60px;font-family:inherit}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.form-group{margin-bottom:14px}
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;color:var(--green)}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.heatmap-cell{aspect-ratio:1;border-radius:3px;background:var(--surface2);position:relative}
.heatmap-cell.l1{background:rgba(34,197,94,.2)}
.heatmap-cell.l2{background:rgba(34,197,94,.4)}
.heatmap-cell.l3{background:rgba(34,197,94,.65)}
.heatmap-cell.l4{background:var(--green)}
.heatmap-cell.today{box-shadow:0 0 0 2px var(--cyan)}
.heatmap-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px;padding:0 2px}
.workout-group{margin-bottom:16px}
.workout-group-title{font-size:13px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.workout-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.workout-card:active{transform:scale(.98)}
.workout-card.selected{border-color:var(--green);background:rgba(34,197,94,.08)}
.workout-card-name{font-weight:700;font-size:15px;margin-bottom:4px}
.workout-card-desc{font-size:12px;color:var(--text2)}
.exercise-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.exercise-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.exercise-name{color:var(--text)}
.exercise-detail{color:var(--text2);font-size:12px}
.coach-note{font-size:11px;color:var(--amber);font-style:italic;margin-top:4px;padding:6px 8px;background:rgba(245,158,11,.06);border-radius:6px}
.core-addon{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:12px;margin-top:12px}
.core-addon-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.focus-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.focus-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px;color:#fff}
.focus-check.done{background:var(--green);border-color:var(--green)}
.focus-text{flex:1;font-size:15px}
.focus-text.done{text-decoration:line-through;opacity:.5}
.focus-delete{color:var(--text2);font-size:18px;cursor:pointer;padding:4px 8px}
.energy-selector{display:flex;gap:6px;margin-top:6px}
.energy-btn{flex:1;padding:10px 4px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s}
.energy-btn.active{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.quality-stars{display:flex;gap:8px;margin-top:6px}
.star{font-size:28px;cursor:pointer;opacity:.3;transition:all .15s}
.star.filled{opacity:1}
.chart-container{position:relative;width:100%;height:200px}
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:6px}
.meal-info{flex:1}
.meal-name{font-size:14px;font-weight:600}
.meal-macros{font-size:12px;color:var(--text2)}
.meal-delete{color:var(--text2);cursor:pointer;padding:4px 8px;font-size:16px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:80dvh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{font-size:24px;cursor:pointer;color:var(--text2);padding:4px}
.empty-state{text-align:center;padding:30px;color:var(--text2);font-size:14px}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag-green{background:rgba(34,197,94,.15);color:var(--green)}
.tag-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(51,65,85,.3);font-size:13px}
.log-entry:last-child{border-bottom:none}
.inline-stat{display:flex;gap:12px;flex-wrap:wrap}
.inline-stat-item{flex:1;min-width:80px;text-align:center;padding:10px;background:var(--surface2);border-radius:8px}
.inline-stat-num{font-size:22px;font-weight:800}
.inline-stat-label{font-size:11px;color:var(--text2);margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// LOCK IN v4 — Wellness Command Center
// ═══════════════════════════════════════════
const TD='2026-11-28';
const STORE_KEY='lockin-data';
const TABS=['today','fuel','train','focus','recharge','stats'];
const TAB_ICONS={today:'📊',fuel:'🍽',train:'💪',focus:'🎯',recharge:'🌙',stats:'📈'};
const TAB_LABELS={today:'Today',fuel:'Fuel',train:'Train',focus:'Focus',recharge:'Rest',stats:'Stats'};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state={tab:'today',modal:null,selectedWorkout:null,data:null,viewDate:null};
let tempSleepQuality=0,tempEnergy=0;

function defaults(){
  return{config:{startWeight:305,goalWeight:270,startDate:'2026-07-08',calorieTarget:2100,proteinTarget:150},weights:{},meals:{},workouts:{},focus:{},sleep:{},photos:{}};
}

function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      const def=defaults();
      state.data={config:{...def.config,...(d.config||{})},weights:{...def.weights,...(d.weights||{})},meals:{...def.meals,...(d.meals||{})},workouts:{...def.workouts,...(d.workouts||{})},focus:{...def.focus,...(d.focus||{})},sleep:{...def.sleep,...(d.sleep||{})},photos:{...def.photos,...(d.photos||{})}};
    }else{state.data=defaults();}
  }catch(e){state.data=defaults();}
  state.viewDate=getToday();
}

function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state.data));}catch(e){}}
function getToday(){return new Date().toISOString().slice(0,10)}
function getVD(){return state.viewDate||getToday()}
function isViewingToday(){return getVD()===getToday()}
function daysBetween(a,b){return Math.ceil((new Date(b)-new Date(a))/(864e5))}
function round1(n){return Math.round(n*10)/10}
function fmtDate(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}

function shiftDate(days){
  const d=new Date(getVD()+'T12:00:00');
  d.setDate(d.getDate()+days);
  const ds=d.toISOString().slice(0,10);
  const today=getToday();
  if(ds>today) return; // can't go into future
  state.viewDate=ds;
  render();
}

// ═══════════════════════════════════════════
// STREAK / MOMENTUM
// ═══════════════════════════════════════════
function getActivityLevel(date){
  let s=0;const d=state.data;
  if(d.weights[date])s++;
  if(d.meals[date]&&d.meals[date].length>0)s++;
  if(d.workouts[date]&&d.workouts[date].length>0)s++;
  if(d.focus[date]&&d.focus[date].length>0)s++;
  if(d.sleep[date])s++;
  return Math.min(s,4);
}

function getCurrentStreak(){
  let streak=0;let d=new Date();
  if(getActivityLevel(getToday())>0)streak++;
  d.setDate(d.getDate()-1);
  while(true){
    const ds=d.toISOString().slice(0,10);
    if(getActivityLevel(ds)>0){streak++;d.setDate(d.getDate()-1);}
    else break;
    if(streak>365)break;
  }
  return streak;
}

function getLongestStreak(){
  const allDates=new Set([...Object.keys(state.data.weights),...Object.keys(state.data.meals),...Object.keys(state.data.workouts),...Object.keys(state.data.focus),...Object.keys(state.data.sleep)]);
  if(allDates.size===0)return 0;
  const sorted=[...allDates].sort();
  let longest=1,current=1;
  for(let i=1;i<sorted.length;i++){
    if(daysBetween(sorted[i-1],sorted[i])===1){current++;longest=Math.max(longest,current);}
    else current=1;
  }
  return longest;
}

function getLatestWeight(){
  const dates=Object.keys(state.data.weights).sort();
  return dates.length>0?state.data.weights[dates[dates.length-1]]:null;
}

}

function renderToday(){
  const vd=getVD();
  const dl=daysBetween(getToday(),TD);
  const w=state.data.weights[vd];
  const startW=state.data.config.startWeight;
  const goalW=state.data.config.goalWeight;
  const latestWeight=getLatestWeight();
  const totalLost=latestWeight?round1(startW-latestWeight):0;
  const totalNeeded=round1(startW-goalW);
  const pct=totalNeeded>0?Math.min(100,round1((totalLost/totalNeeded)*100)):0;
  const streak=getCurrentStreak();
  const vdMeals=state.data.meals[vd]||[];
  const vdCals=vdMeals.reduce((s,m)=>s+(m.calories||0),0);
  const vdProtein=vdMeals.reduce((s,m)=>s+(m.protein||0),0);
  const vdWorkouts=state.data.workouts[vd]||[];

  // Heatmap — last 35 days from TODAY (always anchored to real today)
  const now=new Date();
  const startDay=new Date(now);
  startDay.setDate(startDay.getDate()-34);
  while(startDay.getDay()!==0)startDay.setDate(startDay.getDate()-1);
  const cells=[];const d2=new Date(startDay);
  while(d2<=now||cells.length%7!==0){
    const ds=d2.toISOString().slice(0,10);
    const level=getActivityLevel(ds);
    const isToday=ds===getToday();
    const isFuture=d2>now;
    cells.push(`<div class="heatmap-cell ${isFuture?'':('l'+level)} ${isToday?'today':''}" title="${ds}"></div>`);
    d2.setDate(d2.getDate()+1);
    if(cells.length>42)break;
  }

  return `
    ${renderDateNav()}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="streak-badge">🔥 ${streak} day streak</span>
        <span style="font-size:13px;color:var(--text2)">${dl} days left</span>
      </div>
      <div class="inline-stat">
        <div class="inline-stat-item"><div class="inline-stat-num" style="color:var(--green)">${latestWeight||'--'}</div><div class="inline-stat-label">Current lbs</div></div>
        <div class="inline-stat-item"><div class="inline-stat-num" style="color:var(--cyan)">${totalLost>0?'-':''}${Math.abs(totalLost)}</div><div class="inline-stat-label">Lost</div></div>
        <div class="inline-stat-item"><div class="inline-stat-num" style="color:var(--amber)">${pct}%</div><div class="inline-stat-label">To goal</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Momentum</div>
      <div class="heatmap">${cells.join('')}</div>
      <div class="heatmap-labels"><span>5 weeks ago</span><span>Today</span></div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center;font-size:11px;color:var(--text2)">
        <div class="heatmap-cell" style="width:12px;height:12px;display:inline-block"></div>None
        <div class="heatmap-cell l1" style="width:12px;height:12px;display:inline-block"></div>Low
        <div class="heatmap-cell l2" style="width:12px;height:12px;display:inline-block"></div>Med
        <div class="heatmap-cell l3" style="width:12px;height:12px;display:inline-block"></div>Good
        <div class="heatmap-cell l4" style="width:12px;height:12px;display:inline-block"></div>Full
      </div>
    </div>
    <div class="card">
      <div class="card-title">${isViewingToday()?'Today\'s Snapshot':fmtDate(vd)}</div>
      <div class="stat-row"><span class="stat-label">Weight</span><span class="stat-value">${w?w+' lbs':'—'}</span></div>
      ${!w?`<div class="form-group" style="margin-top:8px"><div style="display:flex;gap:8px">
        <input type="number" id="weight-in" placeholder="Weigh in (lbs)" step="0.1" inputmode="decimal" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="logWeight()">Log</button>
      </div></div>`:''}
      <div class="stat-row"><span class="stat-label">Calories</span><span class="stat-value">${vdCals} <span style="font-size:13px;color:var(--text2)">/ ${state.data.config.calorieTarget}</span></span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(vdCals/state.data.config.calorieTarget)*100)}%;background:${vdCals>state.data.config.calorieTarget?'var(--red)':'var(--green)'}"></div></div>
      <div class="stat-row" style="margin-top:4px"><span class="stat-label">Protein</span><span class="stat-value">${vdProtein}g <span style="font-size:13px;color:var(--text2)">/ ${state.data.config.proteinTarget}g</span></span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(vdProtein/state.data.config.proteinTarget)*100)}%;background:var(--cyan)"></div></div>
      <div class="stat-row" style="margin-top:4px"><span class="stat-label">Workouts</span><span class="stat-value">${vdWorkouts.length>0?vdWorkouts.map(w=>'<span class="tag tag-green">'+w.name+'</span>').join(' '):'None'}</span></div>
    </div>`;
}

      <button class="btn btn-primary" onclick="logWorkout()">Log Workout for ${fmtDate(getVD())}</button>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this){closeModal()}"><div class="modal">
    <div class="modal-title"><span>${title}</span><span class="modal-close" onclick="closeModal()">✕</span></div>${body}
  </div></div>`;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function setTab(t){state.tab=t;state.modal=null;render();}
function showModal(m){state.modal=m;render();}
function closeModal(){state.modal=null;state.selectedWorkout=null;render();}

function jumpToDate(){
  const v=document.getElementById('date-pick')?.value;
  if(v&&v<=getToday()){state.viewDate=v;closeModal();}
}

function logWeight(){
  const v=parseFloat(document.getElementById('weight-in')?.value);
  if(!v||v<50||v>600)return;
  state.data.weights[getVD()]=round1(v);
  save();render();
}

function saveMeal(){
  const name=document.getElementById('meal-name')?.value?.trim();
  const cal=parseInt(document.getElementById('meal-cal')?.value)||0;
  const pro=parseInt(document.getElementById('meal-pro')?.value)||0;
  if(!name)return;
  const vd=getVD();
  if(!state.data.meals[vd])state.data.meals[vd]=[];
  state.data.meals[vd].push({name,calories:cal,protein:pro});
  save();closeModal();
}

function deleteMeal(i){
  const vd=getVD();
  if(state.data.meals[vd]){state.data.meals[vd].splice(i,1);save();render();}
}

function showWorkoutDetail(category,id){
  let workout=null;
  if(category==='gym'){for(const g of WORKOUTS.gym){const f=g.routines.find(r=>r.id===id);if(f){workout={...f,groupName:g.name};break;}}}
  else if(category==='cardio')workout=WORKOUTS.cardio.find(c=>c.id===id);
  else if(category==='home')workout=WORKOUTS.home.find(c=>c.id===id);
  else if(category==='coreAddon'){workout=WORKOUTS.coreAddon.find(c=>c.id===id);if(workout)workout={...workout,isCore:true};}
  if(workout){state.selectedWorkout=workout;state.modal='workout-detail';render();}
}

function logWorkout(){
  const w=state.selectedWorkout;if(!w)return;
  const dur=parseInt(document.getElementById('log-duration')?.value)||0;
  const cal=parseInt(document.getElementById('log-calories')?.value)||0;
  const vd=getVD();
  if(!state.data.workouts[vd])state.data.workouts[vd]=[];
  state.data.workouts[vd].push({name:w.groupName||w.name,routine:w.groupName?w.name:'',duration:dur,calories:cal,isCore:w.isCore||false});
  save();closeModal();
}

function addFocus(){
  const input=document.getElementById('focus-input');
  const text=input?.value?.trim();if(!text)return;
  const vd=getVD();
  if(!state.data.focus[vd])state.data.focus[vd]=[];
  if(state.data.focus[vd].length>=3)return;
  state.data.focus[vd].push({text,done:false});
  save();render();
}

function toggleFocus(i){
  const vd=getVD();
  if(state.data.focus[vd]&&state.data.focus[vd][i]){state.data.focus[vd][i].done=!state.data.focus[vd][i].done;save();render();}
}

function deleteFocus(i){
  const vd=getVD();
  if(state.data.focus[vd]){state.data.focus[vd].splice(i,1);save();render();}
}

function setSleepQuality(n){
  tempSleepQuality=n;
  document.querySelectorAll('.star').forEach(s=>{s.classList.toggle('filled',parseInt(s.dataset.star)<=n);});
}

function setEnergy(n){
  tempEnergy=n;
  document.querySelectorAll('.energy-btn').forEach(b=>{b.classList.toggle('active',parseInt(b.dataset.energy)===n);});
}

function logSleep(){
  const hours=parseFloat(document.getElementById('sleep-hours')?.value);
  if(!hours||hours<0||hours>16)return;if(!tempSleepQuality||!tempEnergy)return;
  state.data.sleep[getVD()]={hours:round1(hours),quality:tempSleepQuality,energy:tempEnergy};
  tempSleepQuality=0;tempEnergy=0;save();render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`lockin-backup-${getToday()}.json`;a.click();URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imp=JSON.parse(ev.target.result);
      if(imp.config||imp.weights){
        const def=defaults();
        state.data={
          config:{...def.config,...(state.data.config||{}),...(imp.config||{})},
          weights:{...(state.data.weights||{}),...(imp.weights||{})},
          meals:{...(state.data.meals||{}),...(imp.meals||{})},
          workouts:{...(state.data.workouts||{}),...(imp.workouts||{})},
          focus:{...(state.data.focus||{}),...(imp.focus||{})},
          sleep:{...(state.data.sleep||{}),...(imp.sleep||{})},
          photos:{...(state.data.photos||{}),...(imp.photos||{})}
        };
        save();render();alert('Data imported successfully!');
      }else{alert('Invalid backup file.');}
    }catch(err){alert('Error reading file.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ═══════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════
function drawWeightChart(){
  const canvas=document.getElementById('weight-chart');if(!canvas)return;
  const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=200*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height='200px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=200,pad={top:20,right:15,bottom:30,left:45};
  const dates=Object.keys(state.data.weights).sort();
  if(dates.length<2){ctx.fillStyle='#94a3b8';ctx.font='14px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('Log 2+ weigh-ins to see trend',W/2,H/2);return;}
  const vals=dates.map(d=>state.data.weights[d]);
  const goal=state.data.config.goalWeight;const allV=[...vals,goal];
  const minV=Math.min(...allV)-5,maxV=Math.max(...allV)+5;
  const xS=(W-pad.left-pad.right)/(dates.length-1);
  const yS=(H-pad.top-pad.bottom)/(maxV-minV);
  const toX=i=>pad.left+i*xS,toY=v=>pad.top+(maxV-v)*yS;

  ctx.strokeStyle='rgba(51,65,85,.5)';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){const v=minV+((maxV-minV)/5)*i;const y=toY(v);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='right';ctx.fillText(Math.round(v),pad.left-8,y+4);}

  const gy=toY(goal);ctx.strokeStyle='rgba(6,182,212,.5)';ctx.lineWidth=1;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(pad.left,gy);ctx.lineTo(W-pad.right,gy);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#06b6d4';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='left';ctx.fillText('Goal: '+goal,W-pad.right-60,gy-6);

  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();
  vals.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();

  vals.forEach((v,i)=>{const x=toX(i),y=toY(v);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#22c55e';ctx.fill();ctx.strokeStyle='#020617';ctx.lineWidth=2;ctx.stroke();});

  ctx.fillStyle='#64748b';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
  const ls=Math.max(1,Math.floor(dates.length/5));
  dates.forEach((d,i)=>{if(i%ls===0||i===dates.length-1)ctx.fillText(d.slice(5),toX(i),H-8);});
}

// ═══════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  const dl=daysBetween(getToday(),TD);
  const tabsHTML=TABS.map(t=>`<button class="tab-btn ${state.tab===t?'active':''}" onclick="setTab('${t}')"><span class="tab-icon">${TAB_ICONS[t]}</span>${TAB_LABELS[t]}</button>`).join('');

  let content='';
  switch(state.tab){
    case'today':content=renderToday();break;
    case'fuel':content=renderFuel();break;
    case'train':content=renderTrain();break;
    case'focus':content=renderFocus();break;
    case'recharge':content=renderRecharge();break;
    case'stats':content=renderStats();break;
  }

  app.innerHTML=`
    <div class="hdr"><div class="hdr-title">LOCK IN</div><div class="hdr-sub">${dl} days to honeymoon</div></div>
    <div class="content">${content}</div>
    <div class="tabs">${tabsHTML}</div>
    ${renderModal()}`;

  if(state.tab==='stats')setTimeout(drawWeightChart,50);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
load();render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
