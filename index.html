<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LOCK IN">
<meta name="theme-color" content="#020617">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LOCK IN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#020617;--card:#0f172a;--input:#1e293b;--border:#1e293b;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--em:#22c55e;--em2:#34d399;--am:#f59e0b;--cy:#06b6d4;--red:#f87171}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;-webkit-text-size-adjust:100%}
body{min-height:100vh;min-height:100dvh;background:var(--bg);padding-top:env(safe-area-inset-top)}
.mono{font-family:'SF Mono',Menlo,Monaco,'Courier New',monospace}
#app{max-width:430px;margin:0 auto}
.hdr{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.hdr-sub{font-size:11px;color:var(--text3)}
.content{padding:0 16px 100px;display:flex;flex-direction:column;gap:14px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(15,23,42,0.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 8px calc(6px + env(safe-area-inset-bottom));z-index:50}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .2s}
.tab.active{color:var(--em)}
.tab-icon{font-size:18px;line-height:1}
.card{background:var(--card);border-radius:16px;padding:14px}
.card-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.ring-container{position:relative;display:flex;align-items:center;justify-content:center;width:140px;height:140px}
.ring-container svg{position:absolute}
.ring-text{text-align:center;z-index:1}
.ring-number{font-size:40px;font-weight:900;line-height:1}
.ring-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:3px}
.stat-row{display:flex;justify-content:center;gap:28px;margin-top:14px}
.stat{text-align:center}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}

/* Progress Bars */
.prog{margin-bottom:6px}
.prog-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.prog-lbl{font-size:12px;color:var(--text2)}
.prog-val{font-size:12px;font-weight:700}
.prog-track{height:10px;border-radius:5px;background:var(--input);overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Food Log */
.food-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.food-item:last-child{border-bottom:none}
.food-info{flex:1;min-width:0}
.food-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-macros{font-size:11px;color:var(--text3);display:flex;gap:8px;margin-top:1px}
.food-del{background:none;border:none;color:var(--text4);font-size:18px;padding:4px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.food-form{margin-top:8px}
.food-input{width:100%;background:var(--input);border:none;border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:6px}
.food-input:focus{box-shadow:0 0 0 2px var(--em)}
.food-input::placeholder{color:var(--text4)}
.food-num-row{display:flex;gap:6px}
.food-num{flex:1;background:var(--input);border:none;border-radius:10px;padding:10px;color:var(--text);font-size:13px;outline:none;text-align:center}
.food-num:focus{box-shadow:0 0 0 2px var(--em)}
.food-num::placeholder{color:var(--text4)}
.food-add-btn{background:var(--em);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.food-add-btn:active{background:#16a34a}
.food-empty{text-align:center;color:var(--text4);font-size:13px;padding:16px 0}

/* Forms */
.form-row{display:flex;align-items:center;justify-content:space-between;background:var(--input);border-radius:12px;padding:10px 12px}
.form-row label{font-size:13px;color:var(--text2)}
.form-input{width:72px;background:var(--card);border:none;border-radius:8px;padding:8px;color:var(--text);text-align:center;font-size:14px;font-family:'SF Mono',Menlo,monospace;outline:none}
.form-input:focus{box-shadow:0 0 0 2px var(--em)}
.form-unit{font-size:11px;color:var(--text3);margin-left:4px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;border:none;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .2s}
.toggle.off{background:var(--input)}
.toggle.on-em{background:rgba(34,197,94,0.1)}
.toggle.on-am{background:rgba(245,158,11,0.1)}
.toggle label{font-size:13px;color:var(--text2);pointer-events:none}
.toggle-track{width:44px;height:26px;border-radius:13px;position:relative;flex-shrink:0;margin-left:10px;transition:background .2s}
.toggle-track.off{background:var(--text3)}
.toggle-track.on-em{background:var(--em)}
.toggle-track.on-am{background:var(--am)}
.toggle-knob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle-knob.off{transform:translateX(3px)}
.toggle-knob.on{transform:translateX(21px)}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.btn-primary{background:var(--em);color:#fff}
.btn-primary:active{background:#16a34a}
.btn-saved{background:var(--input);color:var(--text3)}
.btn-big{padding:18px;font-size:18px;border-radius:16px}
.pill-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.pill.off{background:var(--input);color:var(--text3)}
.pill.on{background:var(--em);color:#fff}
.day-row{display:flex;gap:4px}
.day-btn{width:40px;height:40px;border-radius:50%;border:none;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;transition:all .15s}
.day-btn.off{background:var(--card);color:var(--text3)}
.day-btn.today{background:var(--input);color:var(--em);box-shadow:inset 0 0 0 1px rgba(34,197,94,0.3)}
.day-btn.sel{background:var(--em);color:#fff}
.meal-card{display:flex;flex-direction:column;gap:4px}
.meal-head{display:flex;justify-content:space-between;align-items:flex-start}
.meal-name{font-size:14px;font-weight:600}
.meal-macros-tag{display:flex;gap:8px;flex-shrink:0;margin-left:8px}
.meal-macros-tag span{font-size:11px;font-weight:600}
.meal-desc{font-size:12px;color:var(--text2);line-height:1.5}
.ex-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:13px;color:var(--text2)}
.ex-sets{font-size:12px;color:var(--em);flex-shrink:0;margin-left:8px}
.supp-head{cursor:pointer;-webkit-tap-highlight-color:transparent}
.supp-detail{font-size:12px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6}
.train-note{font-size:12px;color:var(--text2);line-height:1.6;padding:2px 0}
.train-note strong{color:var(--text);font-weight:600}

/* Photos */
.photo-upload{width:100%;padding:16px;background:var(--card);border:2px dashed var(--text4);border-radius:14px;color:var(--text2);font-size:14px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.photo-upload:active{border-color:var(--em);color:var(--em)}
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.photo-cell{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer}
.photo-thumb{width:100%;height:100%;object-fit:cover}
.photo-date{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);font-size:9px;color:#fff;padding:3px 4px;text-align:center}
.photo-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.photo-modal img{max-width:100%;max-height:65vh;border-radius:12px;object-fit:contain}
.photo-modal-date{color:var(--text2);font-size:13px;margin-top:12px}
.photo-modal-actions{display:flex;gap:10px;margin-top:12px}
.photo-modal-btn{background:var(--input);border:none;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.photo-modal-btn.del{color:var(--red)}
.photo-empty{text-align:center;color:var(--text4);font-size:13px;padding:40px 0;line-height:1.8}

/* Charts & Stats */
.chart-wrap{width:100%;overflow:hidden}
.chart-wrap svg{width:100%;height:auto;display:block}
.chart-empty{text-align:center;color:var(--text3);font-size:13px;padding:24px 0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.streak-box{background:var(--input);border-radius:14px;padding:12px;text-align:center}
.streak-val{font-size:24px;font-weight:700}
.streak-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.mile{display:flex;align-items:center;gap:8px;padding:4px 0}
.mile-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.mile-dot.done{background:var(--em);color:#fff}
.mile-dot.todo{background:var(--input);color:var(--text3)}
.mile-label{font-size:13px}
.mile-label.done{color:var(--em)}
.mile-label.todo{color:var(--text3)}
.note-title{font-size:12px;font-weight:600;margin-bottom:4px}
.note-body{font-size:12px;color:var(--text2);line-height:1.6}
.gap-sm{display:flex;flex-direction:column;gap:8px}
.mt-sm{margin-top:6px}
.mt-md{margin-top:12px}
.text-em{color:var(--em)}
.text-am{color:var(--am)}
.text-cy{color:var(--cy)}
.text-muted{color:var(--text3)}
.text-xs{font-size:11px}
.text-sm{font-size:13px}
.text-center{text-align:center}
.fw-bold{font-weight:700}
.reset-link{color:var(--text4);font-size:11px;text-decoration:underline;background:none;border:none;cursor:pointer;padding:16px;margin-top:8px}

/* Setup */
.setup{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.setup-title{font-size:48px;font-weight:900;letter-spacing:-2px}
.setup-sub{font-size:13px;color:var(--text3);margin-top:4px;margin-bottom:40px}
.stepper{display:flex;align-items:center;justify-content:space-between;background:var(--input);border-radius:12px;padding:10px 12px}
.stepper label{font-size:13px;color:var(--text2)}
.stepper-controls{display:flex;align-items:center;gap:10px}
.step-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--card);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.step-btn:active{background:var(--text3)}
.step-val{width:36px;text-align:center;font-size:20px;font-weight:700}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

function getPhase(wk){return wk<=4?0:wk<=8?1:2}

// ═══════ STATE ═══════
let state={
  tab:'today',data:null,photos:[],
  form:{weight:'',workout:false,meals:false,noGas:true},
  foodForm:{name:'',cal:'',pro:''},
  saved:false,mealSlot:'breakfast',selDay:new Date().getDay(),
  suppOpen:-1,photoView:-1,
  setupW:305,setupG:275
};

// ═══════ STORAGE ═══════
function load(){
  try{const r=localStorage.getItem(SK);if(r){state.data=JSON.parse(r);const t=getToday();if(state.data.logs&&state.data.logs[t]){state.form.weight=state.data.logs[t].weight||'';state.form.workout=!!state.data.logs[t].workout;state.form.meals=!!state.data.logs[t].meals;state.form.noGas=state.data.logs[t].noGas!==false;state.saved=!!state.data.logs[t].ts}}}catch(e){}
  try{const r=localStorage.getItem(PK);if(r)state.photos=JSON.parse(r)}catch(e){}
}
function save(){try{localStorage.setItem(SK,JSON.stringify(state.data))}catch(e){}}
function savePhotos(){try{localStorage.setItem(PK,JSON.stringify(state.photos))}catch(e){alert('Storage full. Delete old photos to make room.')}}

// ═══════ HELPERS ═══════
function getToday(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function daysBetween(a,b){return Math.max(0,Math.floor((new Date(b)-new Date(a))/864e5))}
function getWeek(){return Math.max(1,Math.ceil((daysBetween(SD,getToday())+1)/7))}
function getDayName(){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()]}
function getDayIdx(){return new Date().getDay()}

function todayFoods(){
  if(!state.data||!state.data.logs)return[];
  const log=state.data.logs[getToday()];
  return(log&&log.foods)||[];
}
function todayCal(){return todayFoods().reduce((s,f)=>s+(Number(f.cal)||0),0)}
function todayPro(){return todayFoods().reduce((s,f)=>s+(Number(f.pro)||0),0)}

function calcStreak(key){
  if(!state.data||!state.data.logs)return 0;
  let s=0,d=new Date();const t=getToday();
  if(!state.data.logs[t]||!state.data.logs[t].ts)d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(ds<SD)break;const log=state.data.logs[ds];if(!log||!log.ts)break;
    const v=key==='noGas'?log.noGas:key==='workout'?log.workout:key==='meals'?log.meals:false;
    if(v)s++;else break;d.setDate(d.getDate()-1);
  }return s;
}
function getWeightData(){
  if(!state.data||!state.data.logs)return[];
  return Object.entries(state.data.logs).filter(([,v])=>v.weight&&!isNaN(Number(v.weight)))
    .sort(([a],[b])=>a.localeCompare(b)).map(([dt,v])=>({label:`${dt.slice(5,7)}/${dt.slice(8)}`,value:Number(v.weight)}));
}
function getCalData(){
  if(!state.data||!state.data.logs)return[];
  return Object.entries(state.data.logs).filter(([,v])=>v.foods&&v.foods.length)
    .sort(([a],[b])=>a.localeCompare(b)).map(([dt,v])=>({label:`${dt.slice(5,7)}/${dt.slice(8)}`,value:v.foods.reduce((s,f)=>s+(Number(f.cal)||0),0)}));
}
function getProData(){
  if(!state.data||!state.data.logs)return[];
  return Object.entries(state.data.logs).filter(([,v])=>v.foods&&v.foods.length)
    .sort(([a],[b])=>a.localeCompare(b)).map(([dt,v])=>({label:`${dt.slice(5,7)}/${dt.slice(8)}`,value:v.foods.reduce((s,f)=>s+(Number(f.pro)||0),0)}));
}
function latestWeight(){const wd=getWeightData();return wd.length?wd[wd.length-1].value:(state.data?state.data.config.startWeight:305)}
function totalLogs(){return state.data&&state.data.logs?Object.values(state.data.logs).filter(l=>l.ts).length:0}

// ═══════ CHART ═══════
function renderChart(id,data,opts={}){
  setTimeout(()=>{
    const el=document.getElementById(id);if(!el)return;
    if(data.length<2){el.innerHTML='<p class="chart-empty">Log at least 2 entries to see your chart.</p>';return}
    const W=320,H=160,P={t:10,r:10,b:25,l:40};
    const vals=data.map(d=>d.value);const minV=opts.min!=null?opts.min:Math.min(...vals)-3;const maxV=opts.max!=null?opts.max:Math.max(...vals)+3;
    const rng=maxV-minV||1,cW=W-P.l-P.r,cH=H-P.t-P.b;
    const x=i=>P.l+(i/(data.length-1))*cW;const y=v=>P.t+cH-((v-minV)/rng)*cH;
    const pathD=data.map((d,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)} ${y(d.value).toFixed(1)}`).join(' ');
    const areaD=pathD+` L${x(data.length-1).toFixed(1)} ${H-P.b} L${P.l} ${H-P.b} Z`;
    const col=opts.color||'#22c55e';const gid='g'+Math.random().toString(36).slice(2,8);
    let grid='';for(let i=0;i<=4;i++){const gv=minV+(rng*i/4),gy=y(gv);grid+=`<line x1="${P.l}" y1="${gy.toFixed(1)}" x2="${W-P.r}" y2="${gy.toFixed(1)}" stroke="#1e293b" stroke-width="1"/><text x="${P.l-5}" y="${(gy+4).toFixed(1)}" fill="#475569" font-size="10" text-anchor="end" font-family="monospace">${Math.round(gv)}</text>`}
    let xl='';const step=Math.max(1,Math.floor(data.length/4));const shown=new Set();
    for(let i=0;i<data.length;i+=step){xl+=`<text x="${x(i).toFixed(1)}" y="${H-5}" fill="#475569" font-size="9" text-anchor="middle">${data[i].label}</text>`;shown.add(i)}
    if(!shown.has(data.length-1))xl+=`<text x="${x(data.length-1).toFixed(1)}" y="${H-5}" fill="#475569" font-size="9" text-anchor="middle">${data[data.length-1].label}</text>`;
    const dots=data.map((d,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(d.value).toFixed(1)}" r="3" fill="${col}"/>`).join('');
    let ref='';if(opts.refLine!=null){const ry=y(opts.refLine);ref=`<line x1="${P.l}" y1="${ry.toFixed(1)}" x2="${W-P.r}" y2="${ry.toFixed(1)}" stroke="${opts.refColor||'#06b6d4'}" stroke-width="1" stroke-dasharray="4 4"/>`}
    el.innerHTML=`<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>${grid}${xl}<path d="${areaD}" fill="url(#${gid})"/><path d="${pathD}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${ref}${dots}</svg>`;
  },0);
}

// ═══════ PHOTO HANDLING ═══════
function resizePhoto(file,maxW,q,cb){
  const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){
    const c=document.createElement('canvas');let w=img.width,h=img.height;
    if(w>maxW){h=h*maxW/w;w=maxW}c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));
  };img.src=e.target.result};r.readAsDataURL(file);
}
function handlePhoto(input){
  const f=input.files[0];if(!f)return;
  resizePhoto(f,600,0.5,function(dataUrl){
    state.photos.unshift({date:getToday(),data:dataUrl,id:Date.now()});
    savePhotos();input.value='';render();
  });
}
function deletePhoto(id){if(!confirm('Delete this photo?'))return;state.photos=state.photos.filter(p=>p.id!==id);savePhotos();state.photoView=-1;render()}

// ═══════ PROGRESS RING ═══════
function ring(progress,dayNum){
  const r=58,c=2*Math.PI*r,o=c-Math.min(1,Math.max(0,progress))*c;
  return`<div class="ring-wrap"><div class="ring-container"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--card)" stroke-width="8"/><circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--em)" stroke-width="8" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${o.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 1s ease"/></svg><div class="ring-text"><div class="ring-number mono">${dayNum}</div><div class="ring-label">day</div></div></div></div>`;
}

// ═══════ ACTIONS ═══════
function setTab(t){state.tab=t;render()}
function setSlot(s){state.mealSlot=s;render()}
function setDay(d){state.selDay=d;render()}
function toggleSupp(i){state.suppOpen=state.suppOpen===i?-1:i;render()}
function toggleForm(key){state.form[key]=!state.form[key];state.saved=false;render()}
function updateWeight(v){state.form.weight=v;state.saved=false}
function updateFood(key,v){state.foodForm[key]=v}
function viewPhoto(i){state.photoView=i;render()}

function addFood(){
  const ff=state.foodForm;if(!ff.name&&!ff.cal)return;
  const t=getToday();
  if(!state.data.logs[t])state.data.logs[t]={foods:[]};
  if(!state.data.logs[t].foods)state.data.logs[t].foods=[];
  state.data.logs[t].foods.push({id:Date.now(),name:ff.name||'Food',cal:Number(ff.cal)||0,pro:Number(ff.pro)||0});
  state.foodForm={name:'',cal:'',pro:''};save();render();
}
function removeFood(id){
  const t=getToday();if(state.data.logs[t]&&state.data.logs[t].foods){
    state.data.logs[t].foods=state.data.logs[t].foods.filter(f=>f.id!==id);save();render();
  }
}
function saveDay(){
  const t=getToday();
  if(!state.data.logs[t])state.data.logs[t]={foods:[]};
  Object.assign(state.data.logs[t],{weight:state.form.weight,workout:state.form.workout,meals:state.form.meals,noGas:state.form.noGas,ts:Date.now()});
  state.saved=true;save();render();
}
function initialize(){
  state.data={config:{startWeight:state.setupW,goalWeight:state.setupG,startDate:SD,targetDate:TD},logs:{}};
  save();render();
}
function resetAll(){if(!confirm('Reset all LOCK IN data? This cannot be undone.'))return;localStorage.removeItem(SK);localStorage.removeItem(PK);state.data=null;state.photos=[];state.saved=false;state.form={weight:'',workout:false,meals:false,noGas:true};render()}
function stepSetup(key,dir){
  if(key==='w')state.setupW=Math.max(100,Math.min(500,state.setupW+dir));
  else state.setupG=Math.max(100,Math.min(500,state.setupG+dir));
  render();
}

// ═══════ PROGRESS BAR HELPER ═══════
function progBar(label,current,target,color){
  const pct=Math.min(150,target>0?current/target*100:0);
  const barColor=pct>110?'var(--am)':color;
  return`<div class="prog"><div class="prog-hdr"><span class="prog-lbl">${label}</span><span class="prog-val mono" style="color:${pct>110?'var(--am)':pct>=90?'var(--em)':'var(--text2)'}">${current.toLocaleString()} / ${target.toLocaleString()}</span></div><div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,pct)}%;background:${barColor}"></div></div></div>`;
}

  ];
  return`
    <div class="grid-2"><div class="card"><div class="card-label">Weight Lost</div><div class="mono fw-bold text-em" style="font-size:24px">${wl>0?wl:0} lb</div><div class="text-xs text-muted">${latestWeight()} \u2192 ${cfg.goalWeight}</div></div><div class="card"><div class="card-label">Days Logged</div><div class="mono fw-bold" style="font-size:24px">${tl}</div><div class="text-xs text-muted">of ${dn} days</div></div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px">Current Streaks</div><div class="grid-2"><div class="streak-box"><div class="streak-val mono text-am">${calcStreak('noGas')}</div><div class="streak-lbl">Gas Station Skip</div></div><div class="streak-box"><div class="streak-val mono text-em">${calcStreak('workout')}</div><div class="streak-lbl">Workout</div></div><div class="streak-box"><div class="streak-val mono text-cy">${calcStreak('meals')}</div><div class="streak-lbl">Meal Plan</div></div><div class="streak-box"><div class="streak-val mono" style="color:var(--text)">${tl}</div><div class="streak-lbl">Total Logged</div></div></div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px">Weight Trend</div><div class="chart-wrap" id="wt-chart"></div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px">Daily Calories</div><div class="chart-wrap" id="cal-chart"></div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px">Daily Protein</div><div class="chart-wrap" id="pro-chart"></div></div>
    <div class="card"><div class="card-label" style="margin-bottom:10px">Milestones</div>${milestones.map(m=>`<div class="mile"><div class="mile-dot ${m.done?'done':'todo'}">${m.done?'\u2713':''}</div><span class="mile-label ${m.done?'done':'todo'}">${m.l}</span></div>`).join('')}</div>
    <div class="text-center"><button class="reset-link" onclick="resetAll()">Reset all data</button></div>`;
}

// ═══════ SETUP ═══════
function renderSetup(){
  return`<div class="setup">
    <div class="setup-title">LOCK IN</div>
    <div class="setup-sub">${state.setupW} \u2192 ${state.setupG} by November 28</div>
    <div class="card" style="width:100%;max-width:360px">
      <div class="gap-sm">
        <div class="stepper"><label>Starting weight</label><div class="stepper-controls"><button class="step-btn" onclick="stepSetup('w',-5)">\u2212</button><span class="step-val mono">${state.setupW}</span><button class="step-btn" onclick="stepSetup('w',5)">+</button></div></div>
        <div class="stepper"><label>Goal weight</label><div class="stepper-controls"><button class="step-btn" onclick="stepSetup('g',-5)">\u2212</button><span class="step-val mono">${state.setupG}</span><button class="step-btn" onclick="stepSetup('g',5)">+</button></div></div>
      </div>
    </div>
    <button class="btn btn-primary btn-big" style="max-width:360px;margin-top:24px" onclick="initialize()">LOCK IN</button>
  </div>`;
}

// ═══════ MAIN RENDER ═══════
function render(){
  const app=document.getElementById('app');
  if(!state.data){app.innerHTML=renderSetup();return}
  const dl=daysBetween(getToday(),TD);
  const icons={today:'\ud83d\udccb',fuel:'\ud83c\udf4e',train:'\ud83d\udcaa',photos:'\ud83d\udcf8',stats:'\ud83d\udcc8'};
  const labels={today:'Today',fuel:'Fuel',train:'Train',photos:'Photos',stats:'Stats'};
  const tabsHTML=['today','fuel','train','photos','stats'].map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="setTab('${t}')"><span class="tab-icon">${icons[t]}</span>${labels[t]}</button>`).join('');
  let content='';
  switch(state.tab){case'today':content=renderToday();break;case'fuel':content=renderFuel();break;case'train':content=renderTrain();break;case'photos':content=renderPhotos();break;case'stats':content=renderStats();break}
  app.innerHTML=`<div class="hdr"><div class="hdr-title">LOCK IN</div><div class="hdr-sub">${dl} days to honeymoon</div></div><div class="content">${content}</div><div class="tabs">${tabsHTML}</div>`;
  if(state.tab==='stats'){
    renderChart('wt-chart',getWeightData(),{refLine:state.data.config.goalWeight,refColor:'#06b6d4',color:'#22c55e'});
    renderChart('cal-chart',getCalData(),{color:'#22c55e',refLine:CAL_TARGET,refColor:'#22c55e',min:0});
    renderChart('pro-chart',getProData(),{color:'#06b6d4',refLine:PRO_TARGET,refColor:'#06b6d4',min:0});
  }
}

// ═══════ INIT ═══════
document.getElementById('photo-in').addEventListener('change',function(){handlePhoto(this)});
load();render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
